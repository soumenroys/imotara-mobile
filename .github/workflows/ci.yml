# CI for imotara-mobile: typecheck + version sync + unit tests on every push/PR.
# These are the same three gates RELEASE_GO_NO_GO.md asks for manually.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Version sync (package.json / app.json / buildNumber / versionCode)
        run: npm run check:version

      - name: Unit tests
        run: npm test -- --ci
